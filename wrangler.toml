# Downloaded from the diamond-draft Pages project with Wrangler 4.111.0.
# This file changes no remote state until a future deployment uses it; after
# that deployment, it becomes the Pages configuration source of truth.
name = "diamond-draft"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-14"

[vars]
DRAFT_VALIDATION_MODE = "enabled"

[[d1_databases]]
binding = "DB"
database_name = "pennant-pursuit-preview"
database_id = "ba6255b4-9425-4863-b10f-79149180f75a"
preview_database_id = "DB"
migrations_dir = "migrations"

# C4.1/C4.3 private validation services. Preview and production bind to
# different private Workers; production validation is enabled only through its
# private Service Binding.
[[services]]
binding = "VALIDATION_SERVICE"
service = "pennant-pursuit-validation-preview"

[env.production]

[env.production.vars]
DRAFT_VALIDATION_MODE = "enabled"

[[env.production.services]]
binding = "VALIDATION_SERVICE"
service = "pennant-pursuit-validation-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "pennant-pursuit-production"
database_id = "4b821c17-b88b-462d-a2ed-c6a2113cc362"
migrations_dir = "migrations"
