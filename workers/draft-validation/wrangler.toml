name = "pennant-pursuit-validation-preview"
main = "src/index.ts"
compatibility_date = "2026-07-14"

# This Worker is callable only through the Pages Service Binding. It has no
# route or custom domain, and Wrangler must never create public URLs for it.
workers_dev = false
preview_urls = false

[vars]
DRAFT_VALIDATION_MODE = "enabled"
DRAFT_TICKET_MODE = "enabled"
DRAFT_SUBMISSION_MODE = "disabled"

# D1C.1 binds only the private preview Worker to the shared preview database.
# D1C.2 adds a disabled submission path, and D1C.3 adds bounded cleanup through
# the scheduled handler. Production below intentionally has no D1 binding.
[[d1_databases]]
binding = "DB"
database_name = "pennant-pursuit-preview"
database_id = "ba6255b4-9425-4863-b10f-79149180f75a"
preview_database_id = "DB"
migrations_dir = "../../migrations"

[triggers]
crons = ["17 * * * *"]

# Namespace IDs are intentionally distinct from every future production
# namespace. Rate-limit state is managed by Cloudflare, not application storage.
[[ratelimits]]
name = "RATE_LIMIT_BURST"
namespace_id = "16204011"

  [ratelimits.simple]
  limit = 5
  period = 10

[[ratelimits]]
name = "RATE_LIMIT_SUSTAINED"
namespace_id = "16204012"

  [ratelimits.simple]
  limit = 20
  period = 60

# C4.3 uses the same authoritative Worker source with a distinct, private
# production deployment target. Bindings are repeated because Wrangler does
# not inherit binding arrays into named environments.
[env.production]
name = "pennant-pursuit-validation-production"
workers_dev = false
preview_urls = false

[env.production.vars]
DRAFT_VALIDATION_MODE = "enabled"
DRAFT_TICKET_MODE = "disabled"
DRAFT_SUBMISSION_MODE = "disabled"

[env.production.triggers]
crons = []

[[env.production.ratelimits]]
name = "RATE_LIMIT_BURST"
namespace_id = "16204021"

  [env.production.ratelimits.simple]
  limit = 5
  period = 10

[[env.production.ratelimits]]
name = "RATE_LIMIT_SUSTAINED"
namespace_id = "16204022"

  [env.production.ratelimits.simple]
  limit = 20
  period = 60
